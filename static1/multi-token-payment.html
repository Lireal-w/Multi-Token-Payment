<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>多代币支付 - 多代币支付系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .payment-item {
            border: 1px solid #dee2e6;
            border-radius: 0.375rem;
            padding: 15px;
            margin-bottom: 15px;
            background-color: #f8f9fa;
        }
        .payment-item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-money-bill-transfer me-2"></i>多代币支付系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="token-management.html">代币管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="single-payment.html">单笔支付</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="batch-payment.html">批量支付</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="multi-token-payment.html">多代币支付</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="user-info.html">账户信息</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1>多代币支付</h1>
                    <button id="connectWallet" class="btn btn-primary">
                        <i class="fas fa-wallet me-2"></i>连接钱包
                    </button>
                </div>
                <div id="walletStatus" class="alert alert-info">
                    钱包状态: <span class="badge bg-secondary">未连接</span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <!-- 多代币支付表单 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="card-title mb-0">多代币支付设置</h5>
                    </div>
                    <div class="card-body">
                        <form id="multiTokenPaymentForm">
                            <div id="paymentItemsContainer">
                                <!-- 支付项将通过JS动态生成 -->
                            </div>
                            
                            <div class="mt-3">
                                <button type="button" id="addPaymentItem" class="btn btn-sm btn-outline-primary">
                                    <i class="fas fa-plus me-1"></i>添加支付项
                                </button>
                                <button type="button" id="checkAllAllowances" class="btn btn-sm btn-outline-info">
                                    <i class="fas fa-check-circle me-1"></i>检查所有授权
                                </button>
                            </div>
                            
                            <div class="mt-4 pt-3 border-top">
                                <div class="d-flex justify-content-between">
                                    <div>
                                        <strong>支付概览:</strong>
                                        <div id="paymentSummary" class="mt-2">
                                            <!-- 支付摘要将通过JS动态生成 -->
                                        </div>
                                    </div>
                                    <button type="submit" class="btn btn-success align-self-start">
                                        <i class="fas fa-paper-plane me-2"></i>执行多代币支付
                                    </button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <!-- 多代币支付信息 -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">账户概览</h5>
                    </div>
                    <div class="card-body">
                        <div id="multiTokenBalances">
                            <p class="text-muted text-center">请先连接钱包</p>
                        </div>
                        <div class="mt-3">
                            <button id="multiTokenApproveAll" class="btn btn-warning w-100">
                                <i class="fas fa-unlock me-2"></i>授权所有代币
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 多代币支付历史 -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">多代币支付历史</h5>
                    </div>
                    <div class="card-body">
                        <div id="multiTokenTransactionHistory">
                            <p class="text-muted text-center">暂无多代币支付记录</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">多代币支付系统 &copy; 2023</p>
        </div>
    </footer>

    <!-- 支付项模板 (隐藏) -->
    <template id="paymentItemTemplate">
        <div class="payment-item">
            <div class="payment-item-header">
                <h6 class="mb-0">支付项 <span class="item-index">1</span></h6>
                <button type="button" class="btn btn-sm btn-outline-danger remove-payment-item">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">代币</label>
                    <select class="form-select token-select" required>
                        <option value="">选择代币</option>
                    </select>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">收款地址</label>
                    <input type="text" class="form-control recipient-address" required>
                </div>
                <div class="col-md-4 mb-3">
                    <label class="form-label">金额</label>
                    <div class="input-group">
                        <input type="number" class="form-control payment-amount" min="0" step="0.000001" required>
                        <span class="input-group-text token-symbol">-</span>
                    </div>
                </div>
            </div>
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <span class="balance-info text-muted small">余额: -</span>
                    <span class="allowance-info text-muted small ms-2">授权: -</span>
                </div>
                <button type="button" class="btn btn-sm btn-outline-warning approve-single-item">
                    <i class="fas fa-unlock me-1"></i>授权
                </button>
            </div>
        </div>
    </template>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/web3.js"></script>
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/multi-token-payment.js"></script>
</body>
</html>
