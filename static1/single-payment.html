<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>单笔支付 - 多代币支付系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .balance-info {
            background-color: #f8f9fa;
            border-radius: 0.375rem;
            padding: 1rem;
        }
    </style>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-money-bill-transfer me-2"></i>多代币支付系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">首页</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="token-management.html">代币管理</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="single-payment.html">单笔支付</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="batch-payment.html">批量支付</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="multi-token-payment.html">多代币支付</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="user-info.html">账户信息</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1>单笔支付</h1>
                    <button id="connectWallet" class="btn btn-primary">
                        <i class="fas fa-wallet me-2"></i>连接钱包
                    </button>
                </div>
                <div id="walletStatus" class="alert alert-info">
                    钱包状态: <span class="badge bg-secondary">未连接</span>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-lg-8">
                <!-- 支付表单 -->
                <div class="card mb-4">
                    <div class="card-header">
                        <h5 class="card-title mb-0">支付信息</h5>
                    </div>
                    <div class="card-body">
                        <form id="paymentForm">
                            <div class="mb-3">
                                <label for="tokenSelect" class="form-label">选择代币</label>
                                <select class="form-select" id="tokenSelect" required>
                                    <option value="">请选择代币</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="recipientAddress" class="form-label">收款地址</label>
                                <input type="text" class="form-control" id="recipientAddress" required>
                            </div>
                            <div class="mb-3">
                                <label for="paymentAmount" class="form-label">支付金额</label>
                                <div class="input-group">
                                    <input type="number" class="form-control" id="paymentAmount" min="0" step="0.000001" required>
                                    <span class="input-group-text" id="tokenSymbolDisplay">-</span>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between">
                                <button type="button" id="checkAllowance" class="btn btn-outline-info">
                                    <i class="fas fa-check-circle me-2"></i>检查授权
                                </button>
                                <button type="submit" class="btn btn-success">
                                    <i class="fas fa-paper-plane me-2"></i>执行支付
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <!-- 余额和授权信息 -->
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">账户信息</h5>
                    </div>
                    <div class="card-body">
                        <div class="balance-info mb-3">
                            <h6>余额</h6>
                            <p id="balanceDisplay" class="mb-0">-</p>
                        </div>
                        <div class="balance-info">
                            <h6>授权额度</h6>
                            <p id="allowanceDisplay" class="mb-0">-</p>
                        </div>
                        <div class="mt-3">
                            <button id="approveToken" class="btn btn-warning w-100">
                                <i class="fas fa-unlock me-2"></i>授权代币
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- 交易历史 -->
        <div class="row mt-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-header">
                        <h5 class="card-title mb-0">最近交易</h5>
                    </div>
                    <div class="card-body">
                        <div id="transactionHistory">
                            <p class="text-muted text-center">暂无交易记录</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-dark text-light py-4 mt-5">
        <div class="container text-center">
            <p class="mb-0">多代币支付系统 &copy; 2023</p>
        </div>
    </footer>

    <!-- 授权模态框 -->
    <div class="modal fade" id="approveModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">授权代币</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label for="approveAmount" class="form-label">授权金额</label>
                        <input type="number" class="form-control" id="approveAmount" min="0" step="0.000001">
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="unlimitedApprove">
                        <label class="form-check-label" for="unlimitedApprove">
                            无限授权
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" id="confirmApprove" class="btn btn-primary">确认授权</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/web3.js"></script>
    <script src="js/config.js"></script>
    <script src="js/common.js"></script>
    <script src="js/single-payment.js"></script>
</body>
</html>
